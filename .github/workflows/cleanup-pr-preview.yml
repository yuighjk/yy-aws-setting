name: Cleanup PR Preview

on:
  pull_request:
    types: [closed]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  cleanup:
    name: Destroy PR preview
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Validate and prepare preview name
        id: guard
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          REGEX='^[A-Z][A-Z0-9]+-[0-9]+(-[a-z0-9]+(-[a-z0-9]+)*)?$'
          if [[ "$BRANCH_NAME" =~ $REGEX ]] && (( ${#BRANCH_NAME} <= 40 )); then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "preview_name=$(tr '[:upper:]' '[:lower:]' <<<"$BRANCH_NAME")" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "No preview was created for invalid branch: $BRANCH_NAME"
          fi
      - name: Install CDK dependencies
        if: steps.guard.outputs.valid == 'true'
        run: npm ci --prefix infra
      - name: Destroy PR stack
        if: steps.guard.outputs.valid == 'true'
        working-directory: infra
        env:
          CORS_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
          PREVIEW_NAME: ${{ steps.guard.outputs.preview_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          npx cdk destroy "YyAwsSettingPr$PR_NUMBER" --force \
            -c corsOrigins="$CORS_ORIGINS" \
            -c environment=preview \
            -c previewName="$PREVIEW_NAME" \
            -c prNumber="$PR_NUMBER" \
            -c imageTag=cleanup
