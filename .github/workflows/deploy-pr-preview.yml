name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  jira-guard:
    name: Jira Guard
    runs-on: ubuntu-latest
    outputs:
      preview_name: ${{ steps.guard.outputs.preview_name }}
    steps:
      - name: Validate branch name
        id: guard
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          REGEX='^[A-Z][A-Z0-9]+-[0-9]+(-[a-z0-9]+(-[a-z0-9]+)*)?$'
          if [[ ! "$BRANCH_NAME" =~ $REGEX ]]; then
            echo "Invalid branch name: $BRANCH_NAME"
            echo "Expected: JUNIGO-928 or JUNIGO-928-short-description"
            exit 1
          fi
          if (( ${#BRANCH_NAME} > 40 )); then
            echo "Branch name must be at most 40 characters for ECS resource names and preview paths"
            exit 1
          fi
          PREVIEW_NAME=$(tr '[:upper:]' '[:lower:]' <<<"$BRANCH_NAME")
          echo "preview_name=$PREVIEW_NAME" >> "$GITHUB_OUTPUT"
          echo "### Jira Guard ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "Preview name: \`$PREVIEW_NAME\`" >> "$GITHUB_STEP_SUMMARY"

  db-guard:
    name: DB Guard
    runs-on: ubuntu-latest
    outputs:
      migration_changed: ${{ steps.guard.outputs.migration_changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Detect schema and migration changes
        id: guard
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "$CHANGED_FILES"
          MIGRATION_CHANGED=false
          if grep -Eq '(^|/)(migrations?|schema)(/|$)|(^|/)schema\.(sql|go|json)$' <<<"$CHANGED_FILES"; then
            MIGRATION_CHANGED=true
          fi
          echo "migration_changed=$MIGRATION_CHANGED" >> "$GITHUB_OUTPUT"
          echo "### DB Guard ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "Migration required: \`$MIGRATION_CHANGED\`" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$MIGRATION_CHANGED" == "true" ]]; then
            echo 'Changed database files:' >> "$GITHUB_STEP_SUMMARY"
            grep -E '(^|/)(migrations?|schema)(/|$)|(^|/)schema\.(sql|go|json)$' <<<"$CHANGED_FILES" | sed 's/^/- `/' | sed 's/$/`/' >> "$GITHUB_STEP_SUMMARY"
          fi

  prepare:
    name: Prepare API preview name
    needs: [jira-guard, db-guard]
    runs-on: ubuntu-latest
    outputs:
      stack_name: ${{ steps.prepare.outputs.stack_name }}
      image_tag: ${{ steps.prepare.outputs.image_tag }}
      preview_url: ${{ steps.prepare.outputs.preview_url }}
    steps:
      - name: Prepare names
        id: prepare
        env:
          PREVIEW_NAME: ${{ needs.jira-guard.outputs.preview_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          echo "stack_name=YyAwsSettingPr$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "image_tag=pr-$PR_NUMBER-${HEAD_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "preview_url=https://96r1jv57ee.execute-api.ap-northeast-1.amazonaws.com/yy-aws-setting-preview/$PREVIEW_NAME" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy API preview
    needs: [jira-guard, db-guard, prepare]
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: preview
    outputs:
      preview_url: ${{ needs.prepare.outputs.preview_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Test Go
        run: go test ./...
      - name: Install CDK dependencies
        run: npm ci --prefix infra
      - name: Check CDK TypeScript
        run: npm run build --prefix infra
      - name: Deploy shared foundation
        working-directory: infra
        run: npx cdk deploy YyAwsSettingFoundation --require-approval never
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build and push application image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
        run: |
          docker build -t "$REGISTRY/yy-workflow/profile-go:$IMAGE_TAG" .
          docker push "$REGISTRY/yy-workflow/profile-go:$IMAGE_TAG"
      - name: Deploy PR stack
        working-directory: infra
        env:
          CORS_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
          PREVIEW_NAME: ${{ needs.jira-guard.outputs.preview_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
          STACK_NAME: ${{ needs.prepare.outputs.stack_name }}
        run: |
          npx cdk deploy "$STACK_NAME" --require-approval never \
            -c corsOrigins="$CORS_ORIGINS" \
            -c environment=preview \
            -c previewName="$PREVIEW_NAME" \
            -c prNumber="$PR_NUMBER" \
            -c imageTag="$IMAGE_TAG"
      - name: Run database migration task
        if: needs.db-guard.outputs.migration_changed == 'true'
        env:
          CLUSTER_NAME: yy-workflow-profile
          SERVICE_NAME: yy-aws-setting-${{ needs.jira-guard.outputs.preview_name }}
        run: bash .github/scripts/run-ecs-migration.sh "$CLUSTER_NAME" "$SERVICE_NAME"

  comment:
    name: Comment preview URL
    needs: [prepare, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        env:
          PREVIEW_URL: ${{ needs.prepare.outputs.preview_url }}
        with:
          script: |
            const marker = '<!-- yy-preview-url -->';
            const body = `${marker}\n### Preview deployed ✅\n\n- API: ${process.env.PREVIEW_URL}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(comment => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
